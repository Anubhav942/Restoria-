<!-- login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Restoria</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* quick inline styles so it looks OK right away */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif
    }

    .login-box {
      background: #fff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
      width: 320px
    }

    .login-box h2 {
      margin: 0 0 14px
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #dcdfe6;
      border-radius: 6px
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: 0;
      border-radius: 6px;
      background: #0b74d1;
      color: #fff;
      cursor: pointer
    }

    .error {
      color: #b00020;
      display: none;
      margin-top: 8px
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Restoria Login</h2>
    <form id="loginForm" autocomplete="off">
      <input id="username" name="username" type="text" placeholder="Username" required />
      <input id="password" name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <div id="error" class="error">Invalid username or password</div>
    <p style="font-size:12px;margin-top:10px;color:#666">Demo credentials: <strong>admin / 1234</strong></p>
  </div>

  <script src="login.js"></script>
</body>

</html>
